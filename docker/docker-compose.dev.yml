# Oskar — Local Development Docker Compose
# For Lead Engineer workstation use only.
# Uses local build context, mounts src/ for hot-reload.
#
# ADR-007: Redis eliminated. Dev stack = oskar-db-dev · oskar-app-dev
# AUTH_PROVIDER=dev bypasses LDAPS — uses DEV_USERS allowlist (see .env).
# LDAP is not reachable from localhost; use dev bypass for local development.
#
# No read_only hardening here — src/ volume mount requires writable fs for hot-reload.
#
# Usage: docker compose -f docker/docker-compose.dev.yml up -d
# Then:  docker compose -f docker/docker-compose.dev.yml exec oskar-app alembic upgrade head
# Requires: .env file in project root (copy from .env.example, fill in values)

services:

  oskar-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: oskar-app-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MOVEX_API_URL=${MOVEX_API_URL:-http://localhost:9999}
      - MOVEX_API_KEY=${MOVEX_API_KEY:-dev-not-used}
      - MOVEX_CONO=${MOVEX_CONO:-300}
      - DATABASE_URL=postgresql+asyncpg://oskar:oskar_dev@oskar-db-dev:5432/oskar
      - TEST_DATABASE_URL=postgresql+asyncpg://oskar:oskar_dev@oskar-test-db:5432/oskar_test
      # Dev auth bypass — skip LDAP entirely (not reachable from localhost)
      - AUTH_PROVIDER=dev
      - DEV_USERS=${DEV_USERS:-hsalazar,testuser,dc_user,eng_user}
      - SECURE_COOKIE=false
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-ebe708e2900192fddb0b554ced9c6d9f3c5d6d3badda1ad1e3df6b3aeb3a779f}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-ebe708e2900192fddb0b554ced9c6d9f3c5d6d3badda1ad1e3df6b3aeb3a779f}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=60
      - JWT_REFRESH_TOKEN_EXPIRE_HOURS=8
      - SMTP_HOST=
      - SMTP_PORT=25
      - SMTP_SENDER=oskar-noreply@srxglobal.local
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - ENVIRONMENT=development
    volumes:
      - ../src:/app/src:ro
      - ../alembic:/app/alembic:ro
      - ../alembic.ini:/app/alembic.ini:ro
      - ../tests:/app/tests:ro
      - ../pyproject.toml:/app/pyproject.toml:ro
    depends_on:
      oskar-db-dev:
        condition: service_healthy
      oskar-test-db:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  oskar-db-dev:
    image: postgres:16-alpine
    container_name: oskar-db-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=oskar
      - POSTGRES_USER=oskar
      - POSTGRES_PASSWORD=oskar_dev
    volumes:
      - oskar-db-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oskar -d oskar"]
      interval: 5s
      timeout: 3s
      retries: 10

  oskar-test-db:
    image: postgres:16-alpine
    container_name: oskar-test-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=oskar_test
      - POSTGRES_USER=oskar
      - POSTGRES_PASSWORD=oskar_dev
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oskar -d oskar_test"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  oskar-db-dev-data:

networks:
  default:
    name: oskar-dev-network
