# OSKAR Redis Configuration (PRE-2)
#
# Three logical databases with separate operational requirements:
#   DB 0 — Celery broker    (no persistence — jobs are ephemeral)
#   DB 1 — Application cache (no persistence — TTL-managed, allkeys-lru)
#   DB 2 — Event stream      (appendonly yes — engineering events must survive restart)
#
# appendonly yes applies globally but only DB 2 uses streams (XADD).
# DB 0 and DB 1 use only ephemeral data structures (lists, hashes, strings).
# The appendonly log will grow only with DB 2 stream entries in practice.
#
# To split DBs to separate containers later:
#   Change REDIS_BROKER_URL, REDIS_CACHE_URL, REDIS_STREAM_URL env vars
#   to point to separate Redis instances. No code changes required.

# Persistence — appendonly for event stream durability
appendonly yes
appendfsync everysec

# Memory limit — adjust based on SRXWEBAPP1 / Linux VM headroom
# Phase 1 conservative: 512mb. Revisit after load profiling.
maxmemory 512mb

# Cache eviction policy applies to DB 1 (cache).
# DB 0 and DB 2 keys must never be evicted — size them within maxmemory.
maxmemory-policy allkeys-lru

# Bind to all interfaces inside Docker network
bind 0.0.0.0

# Disable protected mode (Docker network provides isolation)
protected-mode no

# Logging
loglevel notice
