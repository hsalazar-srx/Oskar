# Oskar — Pre-commit hooks
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
#
# Hooks:
#   gitleaks  — secret/credential scanning (blocks commits containing secrets)
#   pip-audit — Python dependency vulnerability scan (advisory DB)

repos:

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        language: system
        entry: pip-audit
        args: [-r, requirements.txt]
        pass_filenames: false
        files: requirements.txt
