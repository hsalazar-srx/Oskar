server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend
    # Backend hostname is resolved via a variable (not a literal in proxy_pass) so
    # nginx re-resolves on every request instead of caching the IP for the life of
    # this container — without this, a backend container restart (new IP) causes
    # "connect() failed (111: Connection refused)" 502s until nginx itself restarts.
    resolver 127.0.0.11 valid=30s;
    location /api/ {
        set $backend "oskar-app-staging:8000";
        proxy_pass http://$backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — unknown routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
