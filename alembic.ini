# OSKAR — Alembic configuration
# Run as oskar_migration user (see ai/memory/12-data-model.md §10)
# Usage:
#   alembic upgrade head        — apply all pending migrations
#   alembic downgrade -1        — roll back the last migration
#   alembic revision --autogenerate -m "description"  — generate new migration

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
timezone = UTC

# DATABASE_URL must be set in the environment (asyncpg driver)
# e.g. postgresql+asyncpg://oskar_migration:<pw>@localhost/oskar
sqlalchemy.url = %(DATABASE_URL)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
